- id: simulate_arrival
  alias: Simulate arrival
  trigger:
  - platform: state
    entity_id: alarm_control_panel.abode_alarm
    to: armed_away
  - platform: sun
    event: sunset
  - platform: event
    event_type: event_simulate_arrival
  condition:
  - condition: and
    conditions:
    - condition: state
      entity_id: sun.sun
      state: below_horizon
    - condition: time
      before: '22:00:00'
    - condition: state
      entity_id: alarm_control_panel.abode_alarm
      state: armed_away
  action:
  - delay: 00:{{ (range(10, 45) | random) }}:00
  - if:
    - condition: state
      entity_id: alarm_control_panel.abode_alarm
      state: armed_away
    then:
    - service: input_boolean.turn_on
      data: {}
      target:
        entity_id: input_boolean.garage_entry
  - delay: 00:{{ (range(2, 10) | random) }}:00
  - event: event_simulate_arrival_off
  - event: event_simulate_arrival
- id: simulate_arrival_off
  alias: Simulate arrival off
  trigger:
  - platform: event
    event_type: event_simulate_arrival_off
  condition:
  - condition: state
    entity_id: alarm_control_panel.abode_alarm
    state: armed_away
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.garage_entry
- id: simulate_kitchen_presence
  alias: Simulate kitchen presence
  trigger:
  - platform: state
    entity_id: alarm_control_panel.abode_alarm
    to: armed_away
  - platform: time
    at: '18:01:00'
  - platform: time
    at: 05:01:00
  - platform: event
    event_type: event_simulate_kitchen_presence
  condition:
    condition: or
    conditions:
    - condition: and
      conditions:
      - condition: time
        after: '18:00:00'
      - condition: time
        before: '22:00:00'
      - condition: state
        entity_id: alarm_control_panel.abode_alarm
        state: armed_away
    - condition: and
      conditions:
      - condition: time
        after: 05:00:00
      - condition: time
        before: 09:00:00
      - condition: state
        entity_id: alarm_control_panel.abode_alarm
        state: armed_away
  action:
  - service: light.turn_on
    data:
      entity_id: light.kitchen_pendants_9
  - delay: 00:{{ (range(10, 50) | random) }}:00
  - event: event_simulate_kitchen_presence_off
  - delay: 00:{{ (range(2, 20) | random) }}:00
  - event: event_simulate_kitchen_presence
- id: simulate_kitchen_presence_off
  alias: Simulate kitchen presence off
  trigger:
  - platform: event
    event_type: event_simulate_kitchen_presence_off
  condition:
    condition: state
    entity_id: alarm_control_panel.abode_alarm
    state: armed_away
  action:
  - service: light.turn_off
    data:
      entity_id: light.kitchen_pendants_9
